services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${VIDINSIGHT_FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8001
    networks:
      - default
      - infra
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "${VIDINSIGHT_BACKEND_PORT:-8001}:8001"
    networks:
      - default
      - infra
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz').read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

networks:
  infra:
    external: true
    name: infrastructure

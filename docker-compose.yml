services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    network_mode: host
    environment:
      - VITE_API_BASE_URL=http://127.0.0.1:8001
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz').read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
